# Configuración del API Gateway
server {
    listen 443 ssl;
    server_name api.example.com;

    # Configuración TLS
    ssl_certificate /etc/ssl/certs/api.example.com.crt;
    ssl_certificate_key /etc/ssl/private/api.example.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Incluir configuraciones de API y backend
    include /etc/nginx/api_backends.conf;
    include /etc/nginx/api_conf.d/*.conf;

    # Respuestas de error en formato JSON
    include /etc/nginx/api_json_errors.conf;

    # Registro de accesos
    access_log /var/log/nginx/api_access.log main;

    # Tipo de contenido predeterminado
    default_type application/json;
}
